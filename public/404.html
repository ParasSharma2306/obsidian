<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00a884">
    <title>Page Not Found — ChatLume</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="apple-touch-icon" href="/assets/icon-192.png">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image: radial-gradient(circle at top, rgba(0,168,132,0.07), transparent 40%);
        }
        .notfound {
            text-align: center;
            max-width: 400px;
        }
        .notfound-icon {
            font-size: 64px;
            color: var(--text-muted);
            margin-bottom: 20px;
            opacity: 0.6;
        }
        .notfound h1 {
            font-size: 80px;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 8px;
        }
        .notfound h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .notfound p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            padding: 12px 28px;
            border-radius: 24px;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(0,168,132,0.3);
            transition: background 0.2s;
        }
        .home-btn:hover { background: var(--primary-hover); }
    </style>
</head>
<body>
    <div class="notfound">
        <div class="notfound-icon"><i class="ph-duotone ph-chat-teardrop-slash"></i></div>
        <h1>404</h1>
        <h2>Page not found</h2>
        <p>The page you're looking for doesn't exist or may have moved.</p>
        <a class="home-btn" href="/"><i class="ph ph-house"></i> Back to Home</a>
    </div>
</body>
</html>
